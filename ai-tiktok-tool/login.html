<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - AI TikTok 带货短视频工作台</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b100f;
        --panel: rgba(248, 252, 251, 0.96);
        --ink: #161a22;
        --muted: #687083;
        --line: #d5e0e2;
        --accent: #00b894;
        --accent-dark: #007f68;
        --danger: #bd2c2c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(135deg, #0b100f 0%, #101714 48%, #080c0b 100%);
        background-size: 28px 28px, 28px 28px, auto;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .login-card {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.7;
      }

      label {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
        font-weight: 800;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 13px;
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 143, 114, 0.12);
      }

      button {
        width: 100%;
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        color: #041411;
        background: var(--accent);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 10px 26px rgba(0, 184, 148, 0.24);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .error {
        min-height: 22px;
        margin-top: 14px;
        color: var(--danger);
        font-size: 14px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <form class="login-card" id="loginForm">
      <p class="eyebrow">团队内部工具</p>
      <h1>登录工作台</h1>
      <p>请输入团队账号后继续使用 AI TikTok 带货短视频工作台。</p>

      <label>
        账号
        <input id="username" autocomplete="username" required />
      </label>

      <label>
        密码
        <input id="password" type="password" autocomplete="current-password" required />
      </label>

      <button type="submit">登录</button>
      <div class="error" id="errorMessage" role="alert"></div>
    </form>

    <script>
      const form = document.querySelector("#loginForm");
      const button = form.querySelector("button");
      const errorMessage = document.querySelector("#errorMessage");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        button.textContent = "登录中...";
        errorMessage.textContent = "";

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.querySelector("#username").value.trim(),
              password: document.querySelector("#password").value,
            }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || "登录失败");
          window.location.href = "/";
        } catch (error) {
          errorMessage.textContent = error.message || "登录失败";
        } finally {
          button.disabled = false;
          button.textContent = "登录";
        }
      });
    </script>
  </body>
</html>
